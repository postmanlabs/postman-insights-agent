# Node.js combined test workload (dynamic libssl) — recommended for Kind e2e.
#
# Capture: postman-insights-agent DaemonSet → apidump-ebpf (NOT javatls).
# Deploy via: ./test/kind/deploy-e2e-demo.sh
---
apiVersion: v1
kind: Pod
metadata:
  name: node-service
  namespace: test-apps
  labels:
    app: node-service
spec:
  containers:
  - name: app
    image: pia-node-service:test
    imagePullPolicy: Never
    command: ["node", "server.js"]
    ports:
    - containerPort: 8443
    - containerPort: 8446
    volumeMounts:
    - name: tls
      mountPath: /tls
      readOnly: true
  volumes:
  - name: tls
    configMap:
      name: test-apps-tls
