# DaemonSet that runs the Postman Insights Agent with HTTPS capture enabled.
# Privileges follow docs/https-capture-design.md §8.1:
#   - hostPID: true (so PIDs in /host/proc match the kernel's view)
#   - CAP_BPF + CAP_PERFMON + NET_RAW
#   - /sys/kernel/debug, /sys/fs/bpf, /proc bind-mounts
#
# The agent runs in apidump-ebpf "spike" mode for this e2e (no backend creds).
# The production path is `apidump --enable-https-capture --discovery-mode ...`.
# We log captures to stdout where they can be inspected via `kubectl logs`.
---
apiVersion: v1
kind: Namespace
metadata:
  name: postman-insights
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postman-insights-agent
  namespace: postman-insights
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: postman-insights-agent
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: postman-insights-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: postman-insights-agent
subjects:
- kind: ServiceAccount
  name: postman-insights-agent
  namespace: postman-insights
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: postman-insights-agent
  namespace: postman-insights
spec:
  selector:
    matchLabels:
      app: postman-insights-agent
  template:
    metadata:
      labels:
        app: postman-insights-agent
    spec:
      serviceAccountName: postman-insights-agent
      hostPID: true
      hostNetwork: true
      containers:
      - name: agent
        image: pia-agent-ebpf:test
        imagePullPolicy: Never
        # apidump-ebpf is the spike command — captures HTTPS, prints to stdout.
        # Stats every 10s so `kubectl logs` shows liveness.
        args:
          - "apidump-ebpf"
          - "--stats-every=10s"
          - "--max-capture-bytes=512"
          # --target-namespaces is intentionally NOT set in the kind demo:
          # kind's nested PID/cgroup namespaces make /host/proc/<pid>/cgroup
          # show '0::/../..' instead of paths with pod UIDs, breaking the
          # cgroup-based pod→namespace lookup. The filter code itself is
          # exercised by unit tests in ebpf/discovery/proc_test.go and works
          # correctly on real (non-kind) Kubernetes nodes where the agent's
          # cgroup namespace matches the kernel's. See
          # docs/phases/phase-2-results-v2.md for the full analysis.
          #
          # To enable: add e.g. --target-namespaces=team-py,team-srv
        env:
        - name: POSTMAN_K8S_NODE
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POSTMAN_INSIGHTS_K8S_NODE
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true   # kind requires this for BPF on the LinuxKit kernel
          capabilities:
            add: ["BPF", "PERFMON", "NET_RAW", "SYS_ADMIN"]
        volumeMounts:
        - { name: sys-kernel-debug, mountPath: /sys/kernel/debug }
        - { name: sys-fs-bpf,       mountPath: /sys/fs/bpf }
        # /host/proc here is the LinuxKit-VM /proc that the kind cluster
        # config bind-mounts as /linuxkit-proc on the node. BPF emits root-
        # namespace PIDs that match entries here. In real (non-kind) K8s,
        # /host/proc maps directly to the host's /proc.
        - { name: host-proc,        mountPath: /host/proc, readOnly: true }
      volumes:
      - name: sys-kernel-debug
        hostPath: { path: /sys/kernel/debug, type: Directory }
      - name: sys-fs-bpf
        hostPath: { path: /sys/fs/bpf,       type: Directory }
      - name: host-proc
        hostPath: { path: /linuxkit-proc,    type: Directory }
