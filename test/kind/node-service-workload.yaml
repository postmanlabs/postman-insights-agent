# Node.js combined test workload: REST HTTPS (:8443) + gRPC-TLS (:8446).
#
# Capture: postman-insights-agent DaemonSet → apidump-ebpf (NOT javatls).
# Ensure --target-namespaces includes test-apps on the DaemonSet.
#
# Deploy: ./test/kind/deploy-node-service.sh
---
apiVersion: v1
kind: Pod
metadata:
  name: node-service
  namespace: test-apps
  labels:
    app: node-service
spec:
  hostAliases: []
  containers:
  - name: app
    image: pia-node-service:test
    imagePullPolicy: Never
    # Run node as a child of sh (not PID 1). eBPF uprobes on static BoringSSL
    # fail to fire when node is the container init process (PID 1); wrapping
    # avoids that while keeping the same image.
    command: ["sh", "-c"]
    args: ["node server.js"]
    ports:
    - containerPort: 8443
    - containerPort: 8446
    volumeMounts:
    - name: tls
      mountPath: /tls
      readOnly: true
  volumes:
  - name: tls
    configMap:
      name: test-apps-tls
