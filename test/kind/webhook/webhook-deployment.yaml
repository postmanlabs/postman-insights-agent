# Phase 5c.3b — Kind cluster e2e for the mutating admission webhook.
#
# This file applies the Secret + Deployment + Service. It does NOT apply
# the MutatingWebhookConfiguration — that lives in webhook-config.yaml and
# is applied LAST so the webhook pod is reachable before K8s starts
# calling it.
#
# ROLLBACK (type before any apply):
#   kubectl delete -n postman-insights deploy/postman-insights-webhook
#   kubectl delete -n postman-insights svc/postman-insights-webhook
#   kubectl delete -n postman-insights secret/postman-insights-webhook-tls
---
apiVersion: v1
kind: Secret
metadata:
  name: postman-insights-webhook-tls
  namespace: postman-insights
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postman-insights-webhook
  namespace: postman-insights
  labels:
    app.kubernetes.io/name: postman-insights-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postman-insights-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postman-insights-webhook
    spec:
      containers:
      - name: webhook
        image: postman-insights-agent:5c3b
        imagePullPolicy: IfNotPresent
        args:
        - kube-webhook
        - --addr=:8443
        - --tls-cert=/etc/webhook-tls/tls.crt
        - --tls-key=/etc/webhook-tls/tls.key
        - --init-image=postman-insights-agent:5c3b
        ports:
        - containerPort: 8443
          name: https
        readinessProbe:
          httpGet:
            scheme: HTTPS
            path: /healthz
            port: 8443
          initialDelaySeconds: 2
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            scheme: HTTPS
            path: /healthz
            port: 8443
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: tls
          mountPath: /etc/webhook-tls
          readOnly: true
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: tls
        secret:
          secretName: postman-insights-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: postman-insights-webhook
  namespace: postman-insights
spec:
  selector:
    app.kubernetes.io/name: postman-insights-webhook
  ports:
  - name: https
    port: 443
    targetPort: 8443
