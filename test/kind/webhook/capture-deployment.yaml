# Phase 5c.3b — Java TLS capture deployment.
#
# Runs the apidump-javatls subcommand on the same node as the test workload.
# Replicates the DaemonSet pattern but in a small isolated Deployment to
# avoid disturbing the existing libssl-path DS (which is owned by Phase 2).
#
# ROLLBACK: kubectl delete -f capture-deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: javatls-capture
  namespace: postman-insights
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: javatls-capture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: javatls-capture
    spec:
      hostPID: true                     # kprobes attach against host process tree
      hostNetwork: false                # not strictly needed; default is fine
      containers:
      - name: capture
        image: postman-insights-agent:5c3b
        imagePullPolicy: IfNotPresent
        args:
        - apidump-javatls
        # No --duration → runs indefinitely; we'll delete the deployment for cleanup.
        # The agent gracefully shuts down on SIGTERM, so deletion is clean.
        securityContext:
          privileged: true
          capabilities:
            add: ["SYS_ADMIN","NET_ADMIN","BPF","PERFMON","SYS_RESOURCE","SYS_PTRACE"]
        volumeMounts:
        - name: sys
          mountPath: /sys
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: debugfs
          mountPath: /sys/kernel/debug
      volumes:
      - name: sys
        hostPath: { path: /sys }
      - name: proc
        hostPath: { path: /proc }
      - name: debugfs
        hostPath: { path: /sys/kernel/debug }
      tolerations:
      - operator: Exists
