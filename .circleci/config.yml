# Use the latest 2.1 version of CircleCI pipeline process engine. See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Job graph
# ---------
#   build       — long-running Go build + unit tests (original; ~5 min)
jobs:
  build:
    working_directory: ~/repo
    docker:
      - image: cimg/go:1.25.11
    steps:
      - checkout
      - restore_cache:
          keys:
            - go-mod-v4-{{ checksum "go.sum" }}
      - run:
          name: Install Dependencies
          command: go mod download
      - run:
          name: Install pcap and eBPF toolchain
          command: |
            sudo apt-get update -y
            sudo apt-get install -y libpcap-dev clang llvm libbpf-dev linux-tools-common
            # On Ubuntu 24.04 (Noble), bpftool is not a standalone package — it lives in
            # linux-tools-<kernel-version>. Install that, then symlink to a stable PATH location.
            sudo apt-get install -y linux-tools-$(uname -r) 2>/dev/null \
              || sudo apt-get install -y linux-tools-generic
            BPFTOOL=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
            [ -n "$BPFTOOL" ] && sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
            bpftool version
      - run:
          name: Install mockgen and bpf2go
          command: |
            go install github.com/golang/mock/mockgen@v1.5.0
            go install github.com/cilium/ebpf/cmd/bpf2go@v0.18.0
      - run:
          name: Generate vmlinux.h from CI host kernel BTF
          command: |
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > ebpf/programs/vmlinux.h
      - save_cache:
          key: go-mod-v4-{{ checksum "go.sum" }}
          paths:
            - "/go/pkg/mod"
      - run:
          name: Build CLI
          command: |
            make
      - run:
          name: Run tests
          command: |
            make mock
            mkdir -p /tmp/test-reports
            gotestsum --junitfile /tmp/test-reports/unit-tests.xml
      - store_test_results:
          path: /tmp/test-reports

workflows:
  ci:
    jobs:
      - build
